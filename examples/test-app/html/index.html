<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESQEMU Test App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }
        .status {
            background: rgba(76, 175, 80, 0.8);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: bold;
            margin-top: 1rem;
        }
        .info {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 DESQEMU работает!</h1>
        <p>Это тестовое приложение для проверки DESQEMU системы.</p>
        <div class="status">✅ Система готова к работе</div>
        
        <div class="info">
            <p><strong>Время запуска:</strong> <span id="startTime"></span></p>
            <p><strong>Порт:</strong> 8080</p>
            <p><strong>VNC:</strong> localhost:5900 (пароль: desqemu)</p>
        </div>
    </div>

    <script>
        // Показываем время запуска
        document.getElementById('startTime').textContent = new Date().toLocaleString('ru-RU');
        
        // Простая анимация
        let hue = 0;
        setInterval(() => {
            hue = (hue + 1) % 360;
            document.body.style.background = `linear-gradient(135deg, hsl(${hue}, 70%, 60%) 0%, hsl(${hue + 60}, 70%, 50%) 100%)`;
        }, 100);
    </script>
</body>
</html>
